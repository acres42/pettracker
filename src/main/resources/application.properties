server.port=${PORT:8080}

rescuegroups.api.key=${RESCUEGROUPS_API_KEY:}
rescuegroups.api.base-url=${RESCUEGROUPS_API_BASE_URL:https://api.rescuegroups.org/v5}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:pettracker;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
