spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:pettracker}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:pettracker}
    password: ${MYSQL_PASSWORD:pettracker}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    defer-datasource-initialization: false
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true
