spring:
  application:
    name: pettracker
  datasource:
    url: jdbc:h2:mem:pettracker-auth-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false

server:
  servlet:
    session:
      timeout: 30m
      tracking-modes: cookie
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: strict

rescuegroups:
  base-url: ${RESCUEGROUPS_BASE_URL:https://api.rescuegroups.org/v5}
  api-key: ${RESCUEGROUPS_API_KEY:}

logging:
  level:
    "[com.ac.pettracker.integration.RescueGroupsClient]": DEBUG
