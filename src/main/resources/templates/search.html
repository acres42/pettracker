<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Search adoptable pets by type and location in PetTracker." />
  <meta property="og:title" content="PetTracker Search" />
  <meta property="og:description" content="Find adoptable pets by type." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <title>
    Search Pets
  </title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <header class="site-header">
    <a class="brand" href="/dashboard" aria-label="Go to dashboard">
      <img class="site-logo" src="/images/favicon.svg" alt="PetTracker logo" />
      <span class="brand-text">PetTracker</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/dashboard">Dashboard</a>
      <a href="/search">Search</a>
      <a href="/profile">Profile</a>
      <a th:href="${session.authUserId != null ? '/logout' : '/'}"
        th:text="${session.authUserId != null ? 'Logout' : 'Login'}">Logout</a>
    </nav>
  </header>
  <main class="glass search-panel">
    <p class="eyebrow">
      Find your next best friend
    </p>

    <h1>
      Search Pets
    </h1>

    <p class="lede">
      Search adoptable pets by animal type.
    </p>

    <form class="search-bar" method="get" action="/pets/results">
      <label>
        <span>
          Animal Type
        </span>
        <select name="type" required>
          <option value="">Select type...</option>
          <option value="dog">Dog</option>
          <option value="cat">Cat</option>
          <option value="rabbit">Rabbit</option>
          <option value="bird">Bird</option>
        </select>
      </label>

      <label>
        <span>
          Gender
        </span>
        <select name="gender">
          <option value="">Any</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </label>

      <label>
        <span>
          Age
        </span>
        <select name="ageBand">
          <option value="">Any</option>
          <option value="young">Young (0–2 yrs)</option>
          <option value="adult">Adult (3–7 yrs)</option>
          <option value="senior">Senior (8+ yrs)</option>
        </select>
      </label>

      <label>
        <span>
          Keywords
        </span>
        <input name="keywords" placeholder="e.g. calm, good with kids" />
      </label>

      <button type="submit">
        Search
      </button>
    </form>
  </main>

  <section th:if="${suggestedPets != null and !#lists.isEmpty(suggestedPets)}" class="glass suggested-pets">
    <p class="eyebrow">
      Based on your preferences
    </p>
    <h2>
      Pets You May Like
    </h2>
    <div class="carousel-wrapper">
      <button class="carousel-btn carousel-prev" aria-label="Previous pet">&#9664;</button>
      <div class="carousel-viewport">
        <div class="carousel-track">
          <div class="carousel-card" th:each="pet : ${suggestedPets}">
            <div class="carousel-card-inner">
              <div th:if="${pet.imageUrl != null and !pet.imageUrl.isBlank()}">
                <img th:src="${pet.imageUrl}" th:alt="${pet.name}" class="carousel-img" />
              </div>
              <div th:unless="${pet.imageUrl != null and !pet.imageUrl.isBlank()}" class="carousel-img-fallback">
                No image
              </div>
              <h3 class="carousel-card-name" th:text="${pet.name}">Pet name</h3>
              <p class="carousel-card-type" th:text="${pet.type}">type</p>
              <p class="carousel-card-desc" th:text="${pet.description}">Description</p>
              <form class="save-form" method="post" th:action="@{/dashboard/save}">
                <input type="hidden" name="name" th:value="${pet.name}" />
                <input type="hidden" name="type" th:value="${pet.type}" />
                <input type="hidden" name="breed" th:value="${pet.breed}" />
                <input type="hidden" name="age" th:value="${pet.age}" />
                <input type="hidden" name="description" th:value="${pet.description}" />
                <input type="hidden" name="imageUrl" th:value="${pet.imageUrl}" />
                <button class="carousel-save"
                  th:classappend="${savedPetKeys != null and savedPetKeys.contains(pet.name + '|' + pet.type + '|' + pet.breed + '|' + pet.age)} ? 'is-saved' : ''"
                  type="submit"
                  th:attr="aria-pressed=${savedPetKeys != null and savedPetKeys.contains(pet.name + '|' + pet.type + '|' + pet.breed + '|' + pet.age)},disabled=${savedPetKeys != null and savedPetKeys.contains(pet.name + '|' + pet.type + '|' + pet.breed + '|' + pet.age)} ? 'disabled' : null"
                  th:text="${savedPetKeys != null and savedPetKeys.contains(pet.name + '|' + pet.type + '|' + pet.breed + '|' + pet.age)} ? 'Saved ♥' : 'Save ♡'"
                  aria-label="Save pet to dashboard">
                  Save ♡
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <button class="carousel-btn carousel-next" aria-label="Next pet">&#9654;</button>
    </div>
    <script>
      (function () {
        var viewport = document.querySelector('.carousel-viewport');
        var track = document.querySelector('.carousel-track');
        if (!track || !viewport) return;
        var realCards = Array.from(track.children);
        var n = realCards.length;
        if (n === 0) return;

        function mod(i, m) { return ((i % m) + m) % m; }

        var clonesBefore = [realCards[mod(-2, n)], realCards[mod(-1, n)]].map(function (c) {
          var cl = c.cloneNode(true);
          cl.setAttribute('aria-hidden', 'true');
          return cl;
        });
        var clonesAfter = [realCards[0], realCards[mod(1, n)]].map(function (c) {
          var cl = c.cloneNode(true);
          cl.setAttribute('aria-hidden', 'true');
          return cl;
        });
        clonesBefore.forEach(function (c) { track.insertBefore(c, track.firstChild); });
        clonesAfter.forEach(function (c) { track.appendChild(c); });

        var current = 2;
        var animating = false;

        function cardWidth() { return viewport.offsetWidth / 3; }

        function setWidths() {
          var cw = cardWidth();
          Array.from(track.children).forEach(function (c) {
            c.style.width = cw + 'px';
            c.style.flexShrink = '0';
          });
        }

        function applyFocus() {
          Array.from(track.children).forEach(function (c, i) {
            c.classList.toggle('is-center', i === current);
            c.classList.toggle('is-left', i === current - 1);
            c.classList.toggle('is-right', i === current + 1);
          });
        }

        function moveTo(index, animate) {
          if (!animate) {
            track.style.transition = 'none';
            track.offsetHeight;
          } else {
            track.style.transition = 'transform 0.42s cubic-bezier(0.4, 0, 0.2, 1)';
          }
          track.style.transform = 'translateX(' + (-(index - 1) * cardWidth()) + 'px)';
          current = index;
          applyFocus();
        }

        setWidths();
        moveTo(2, false);

        track.addEventListener('transitionend', function () {
          if (current < 2) moveTo(current + n, false);
          else if (current > n + 1) moveTo(current - n, false);
          animating = false;
        });

        document.querySelector('.carousel-prev').addEventListener('click', function () {
          if (animating) return;
          animating = true;
          moveTo(current - 1, true);
        });

        document.querySelector('.carousel-next').addEventListener('click', function () {
          if (animating) return;
          animating = true;
          moveTo(current + 1, true);
        });

        window.addEventListener('resize', function () {
          setWidths();
          moveTo(current, false);
        });
      })();
    </script>
  </section>

</body>

</html>
