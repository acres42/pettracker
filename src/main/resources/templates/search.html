<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>
      Search Pets
    </title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="glass">
      <h1>
        Search Pets
      </h1>

      <form class="search-bar" method="get" action="/pets/results">
        <input name="type" placeholder="Dog, cat, rabbit..." required />
        <input name="location" placeholder="ZIP code" required />
        <button type="submit">
          Search
        </button>
      </form>
    </main>
  </body>
</html>
