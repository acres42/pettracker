<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Create your PetTracker account to start searching and saving adoptable pets." />
  <meta property="og:title" content="PetTracker Sign Up" />
  <meta property="og:description" content="Join PetTracker and start building your saved pet dashboard." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/css/styles.css" />
  <title>
    PetTracker Sign Up
  </title>
</head>

<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Go to login page">
      <img class="site-logo" src="/images/favicon.svg" alt="PetTracker logo" />
      <span class="brand-text">PetTracker</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/">Login</a>
    </nav>
  </header>
  <main class="glass search-panel">
    <p class="eyebrow">
      New to PetTracker
    </p>
    <h1>
      Sign Up
    </h1>
    <p>
      Create your account and start building your saved pet dashboard.
    </p>
    <form class="search-bar" method="post" action="/auth/register">
      <label>
        <span>
          Email
        </span>
        <input type="email" name="email" placeholder="new-user@example.com" required />
      </label>
      <label>
        <span>
          Password
        </span>
        <input type="password" name="password" placeholder="8+ characters" minlength="8" required />
      </label>
      <button type="submit">
        Create Account
      </button>
    </form>
    <section class="preview">
      <p>
        Already have an account?
        <a class="auth-link" href="/">Log in</a>
      </p>
    </section>
  </main>
</body>

</html>
