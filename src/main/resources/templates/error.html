<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="PetTracker error page for invalid search input or unexpected failures." />
  <meta property="og:title" content="PetTracker Error" />
  <meta property="og:description" content="An error occurred while processing your request." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <title>Error</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <header class="site-header">
    <a class="brand" href="/dashboard" aria-label="Go to dashboard">
      <img class="site-logo" src="/images/favicon.svg" alt="PetTracker logo" />
      <span class="brand-text">PetTracker</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/dashboard">Dashboard</a>
      <a href="/search">Search</a>
      <a href="/profile">Profile</a>
      <a th:href="${session.authUserId != null ? '/logout' : '/'}"
        th:text="${session.authUserId != null ? 'Logout' : 'Login'}">Logout</a>
    </nav>
  </header>
  <main class="glass error-panel">
    <h1 class="error-title" th:text="${errorTitle}">Something went wrong</h1>
    <p class="error-message" th:text="${errorMessage}">Please try again.</p>
    <a class="back-link" href="/search">Back to search</a>
  </main>
</body>

</html>
