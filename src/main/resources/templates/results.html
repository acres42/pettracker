<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="View adoptable pet search results in PetTracker." />
  <meta property="og:title" content="PetTracker Results" />
  <meta property="og:description" content="Browse adoptable pet search results by type and location." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <title>
    Results
  </title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <header class="site-header">
    <a class="brand" href="/dashboard" aria-label="Go to dashboard">
      <img class="site-logo" src="/images/favicon.svg" alt="PetTracker logo" />
      <span class="brand-text">PetTracker</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/dashboard">Dashboard</a>
      <a href="/search">Search</a>
      <a href="/profile">Profile</a>
      <a th:href="${session.authUserId != null ? '/logout' : '/'}"
        th:text="${session.authUserId != null ? 'Logout' : 'Login'}">Logout</a>
    </nav>
  </header>
  <main class="glass results-panel">
    <p class="eyebrow">
      Search results
    </p>
    <h1>
      Available Pets
    </h1>
    <p class="lede">
      Showing
      <span th:text="${type}"></span>
      results near
      <span th:text="${location}"></span>
      .
    </p>

    <section class="empty-state" th:if="${#lists.isEmpty(pets)}">
      <h2>
        No pets found
      </h2>
      <p>
        Try a different animal type or location.
      </p>
    </section>

    <section class="pet-grid" th:if="${!#lists.isEmpty(pets)}">
      <article class="pet-card" th:each="pet : ${pets}">
        <div th:if="${pet.imageUrl != null and !pet.imageUrl.isBlank()}">
          <img th:src="${pet.imageUrl}" th:alt="${pet.name}" class="pet-image" />
        </div>

        <div th:unless="${pet.imageUrl != null and !pet.imageUrl.isBlank()}" class="pet-image-fallback">
          No image available
        </div>

        <h2 th:text="${pet.name}">Buddy</h2>
        <p class="pet-type" th:text="${pet.type}">dog</p>
        <p th:text="${pet.description}">Friendly dog</p>

        <form class="save-form" method="post" th:action="@{/dashboard/save}">
          <input type="hidden" name="name" th:value="${pet.name}" />
          <input type="hidden" name="type" th:value="${pet.type}" />
          <input type="hidden" name="breed" th:value="${pet.breed}" />
          <input type="hidden" name="age" th:value="${pet.age}" />
          <input type="hidden" name="description" th:value="${pet.description}" />
          <input type="hidden" name="imageUrl" th:value="${pet.imageUrl}" />
          <button class="heart-save"
            th:classappend="${savedPetKeys.contains(pet.name + '|' + pet.type + '|' + pet.breed + '|' + pet.age)} ? 'is-saved' : ''"
            type="submit"
            th:attr="aria-pressed=${savedPetKeys.contains(pet.name + '|' + pet.type + '|' + pet.breed + '|' + pet.age)},disabled=${savedPetKeys.contains(pet.name + '|' + pet.type + '|' + pet.breed + '|' + pet.age)} ? 'disabled' : null"
            th:text="${savedPetKeys.contains(pet.name + '|' + pet.type + '|' + pet.breed + '|' + pet.age)} ? 'Saved ♥' : 'Save ♡'"
            aria-label="Save pet to dashboard">
            Save ♡
          </button>
        </form>
      </article>
    </section>

    <a class="back-link" href="/search">
      Search again
    </a>
  </main>
</body>

</html>
