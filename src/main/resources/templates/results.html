<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>
      Results
    </title>
  </head>
  <body>
    <h1>
      Search Results
    </h1>

    <p>
      Type:
      <span th:text="${type}"></span>
    </p>
    <p>
      Location:
      <span th:text="${location}"></span>
    </p>

    <ul>
      <li th:each="pet : ${pets}">
        <strong th:text="${pet.name}"></strong>
        <span>
          -
        </span>
        <span th:text="${pet.description}"></span>
      </li>
    </ul>
  </body>
</html>
