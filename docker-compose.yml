services:
  mysql:
    image: mysql:8.4
    container_name: pettracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pettracker}
      MYSQL_USER: ${MYSQL_USER:-pettracker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pettracker}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
