<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>
    Results
  </title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
  <main class="glass results-panel">
    <p class="eyebrow">
      Search results
    </p>
    <h1>
      Available Pets
    </h1>
    <p class="lede">
      Showing
      <span th:text="${type}"></span>
      results near
      <span th:text="${location}"></span>
      .
    </p>

    <section class="empty-state" th:if="${#lists.isEmpty(pets)}">
      <h2>
        No pets found
      </h2>
      <p>
        Try a different animal type or location.
      </p>
    </section>

    <section class=" pet-grid" th:if="${!#lists.isEmpty(pets)}">
      <article class="pet-card" th:each="pet : ${pets}">
        <h2 th:text="${pet.name}"></h2>
        <p class="pet-type" th:text="${pet.type}"></p>
        <p th:text="${pet.description}"></p>
      </article>
    </section>

    <a class="back-link" href="/search">
      Search again
    </a>
  </main>
</body>

</html>
