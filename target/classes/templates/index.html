<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>
      Pet Interest Tracker
    </title>
  </head>
  <body>
    <main>
      <h1>
        Pet Interest Tracker
      </h1>
      <p>
        Search adoptable pets and save the ones you want to follow up on.
      </p>
      <form class="search-bar">
        <input type="text" placeholder="Search for dogs, cats, breeds..." />
        <button type="submit">
          Search
        </button>
      </form>
      <section class="preview">
        <p>
          Browse adoptable pets across shelters near you.
        </p>
      </section>
    </main>
  </body>
</html>
